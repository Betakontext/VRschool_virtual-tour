<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quinoa 360° VR Tour</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-layout-component@5.3.0/dist/aframe-layout-component.min.js"></script>
    <script src="https://unpkg.com/aframe-template-component@3.2.2/dist/aframe-template-component.min.js"></script>

    <style>
      a-scene { touch-action: none; }
      .loading-bar {
        position: absolute; bottom: 20px; left: 20px;
        width: 120px; height: 18px; background: rgba(0,0,0,0.6);
        border-radius: 9px; padding: 2px; z-index: 9999; opacity: 0; transition: opacity 0.3s;
      }
      #progress {
        height: 100%; width: 0%; background: white;
        border-radius: 7px; transition: width 0.2s;
      }
    </style>
  </head>
  <body>

    <!-- Ladebalken -->
    <div class="loading-bar"><div id="progress"></div></div>

    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true">
      <a-entity light="type: ambient; intensity: 1.0"></a-entity>

      <!-- Doppelter Himmel für Crossfade -->
      <a-sky id="sky-current" src="#Kunstraum" opacity="1" material="transparent: true"></a-sky>
      <a-sky id="sky-next" src="#placeholder" opacity="0" visible="false" material="transparent: true"></a-sky>

      <a-assets timeout="30000">
        <!-- 360°-Panoramen -->
        <img id="Werkstatt" src="img/Werkstatt.jpeg">
        <img id="Mensa" src="img/Mensa.jpeg">
        <img id="Nawi" src="img/Nawi.jpeg">
        <img id="Klassenraum" src="img/Klassenraum.jpeg">
        <img id="Infokasten" src="img/Infokasten.jpeg">
        <img id="Hof" src="img/Hof.jpeg">
        <img id="Bibliothek" src="img/Bibliothek.jpeg">
        <img id="Kueche" src="img/Kueche.jpeg">
        <img id="Teilungsraum" src="img/Teilungsraum.jpeg">
        <img id="Kunstraum" src="img/Kunstraum.jpeg">

        <!-- Thumbnails -->
        <img id="Werkstatt-thumb" src="img/Werkstatt-thumb.jpg">
        <img id="Hof-thumb" src="img/Hof-thumb.jpg">
        <img id="Bibliothek-thumb" src="img/Bibliothek-thumb.jpg">
        <img id="Kueche-thumb" src="img/Kueche-thumb.jpg">
        <img id="Teilungsraum-thumb" src="img/Teilungsraum-thumb.jpg">
        <img id="Kunstraum-thumb" src="img/Kunstraum-thumb.jpg">
        <img id="Mensa-thumb" src="img/Mensa-thumb.jpg">
        <img id="Nawi-thumb" src="img/Nawi-thumb.jpg">
        <img id="Klassenraum-thumb" src="img/Klassenraum-thumb.jpg">
        <img id="Logo-thumb" src="img/QuinoaBildung-Logo.png">

        <!-- Platzhalter -->
        <img id="placeholder" src="img/placeholder.jpg">

        <!-- VIDEO: Mensa -->
        <video id="MensaVideo"
               src="videos/Quinoa10Jahre_lq.mp4"
               crossorigin="anonymous"
               playsinline webkit-playsinline
               preload="auto"
               loop
               muted>
        </video>

        <!-- VIDEO: Hof -->
        <video id="HofVideo"
               src="videos/Bauhuette_lq.mp4"
               crossorigin="anonymous"
               playsinline webkit-playsinline
               preload="auto"
               loop
               muted>
        </video>
      </a-assets>

      <!-- Template für klickbare Thumbs -->
      <script id="link" type="text/html">
        <a-entity class="link"
                  geometry="primitive: plane; width: 1; height: 0.7"
                  material="shader: flat; src: ${thumb}; transparent: true"
                  event-set__enter="_event: mouseenter; scale: 1.1 1.1 1"
                  event-set__leave="_event: mouseleave; scale: 1 1 1"
                  tour-link="targetId: ${id}">
        </a-entity>
      </script>

      <!-- Link-Gruppen -->
      <a-entity id="links0" layout="type: line; margin: 1.2" position="-5 1.9 -1" rotation="0 90 0">
        <a-entity template="src: #link" data-id="Werkstatt" data-thumb="#Werkstatt-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Hof" data-thumb="#Hof-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Teilungsraum" data-thumb="#Teilungsraum-thumb"></a-entity>
      </a-entity>
      <a-entity id="links1" layout="type: line; margin: 1.2" position="-5 1 -1" rotation="0 90 0">
        <a-entity template="src: #link" data-id="Bibliothek" data-thumb="#Bibliothek-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Kunstraum" data-thumb="#Kunstraum-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Kueche" data-thumb="#Kueche-thumb"></a-entity>
      </a-entity>
      <a-entity id="links3" layout="type: line; margin: 1.2" position="-5 0.1 -1" rotation="0 90 0">
        <a-entity template="src: #link" data-id="Mensa" data-thumb="#Mensa-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Nawi" data-thumb="#Nawi-thumb"></a-entity>
        <a-entity template="src: #link" data-id="Klassenraum" data-thumb="#Klassenraum-thumb"></a-entity>
      </a-entity>
      <a-entity id="links4" layout="type: line; margin: 1.2" position="5 -0.35 0.8" rotation="0 -110 0">
        <a-entity template="src: #link" data-id="Infokasten" data-thumb="#Logo-thumb"></a-entity>
      </a-entity>

      <!-- Mensa: Video-Panel separat -->
      <a-entity id="panel-MensaVideo" visible="false" position="4 1.15 -2.0" rotation="0 -45 0">
        <a-plane width="1.7" height="0.96" color="#000" position="0 0 -0.002" opacity="0.7"></a-plane>
        <a-video id="mensa-video-plane"
                 class="link"
                 src="#MensaVideo"
                 width="3.2" height="1.8"
                 position="-0.75 0 0"
                 video-controls="video: #MensaVideo; hint: #unmute-hint">
        </a-video>
        <a-text id="unmute-hint"
                value="Bitte blinzeln um den Ton zu aktivieren."
                align="center"
                width="2"
                position="-0.75 -1 0"
                color="#fff"
                visible="false">
        </a-text>
      </a-entity>

      <!-- Mensa -->
      <a-entity id="panel-Mensa" visible="false">
        <a-entity id="info-icon-Mensa"
                  position="1.5 1.0 -5.5"
                  geometry="primitive: plane; width: 0.5; height: 0.5"
                  material="src: img/Infobutton.png; transparent: true;"
                  class="clickable"
                  info-trigger="box: #infobox-Mensa"></a-entity>

        <a-entity id="infobox-Mensa" visible="false" position="-1 1.75 -4.5" rotation="0 0 0">
          <a-plane width="3.3" height="1.9" color="#fff" opacity="0.9"></a-plane>

          <a-text
            value="Hier ist unsere Kueche: Mehr als nur ein Ort zum Essen holen. Sie ist Treffpunkt, Wohlfuehlort und manchmal auch kleine Rettungsstation im Alltag. Tamara und Nikos sind immer fuer uns da – ob mit leckerem Essen, einem Kuehlpack, einer Tasse Tee oder einfach einem offenen Ohr und einem guten Gespraech."
            color="#000" position="0 -0.55 0.02" width="2.4" align="center"
            material="depthTest: false; depthWrite: false"></a-text>

          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5"
                    material="color: #ff0000"
                    position="1.35 0.65 0.01"
                    class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.0" scale="2 2 2" position="0 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Klassenraum -->
      <a-entity id="panel-Klassenraum" visible="false" position="0 1.2 -2.0" rotation="0 0 0">
        <a-entity id="info-icon-Klassenraum"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Klassenraum"></a-entity>

        <a-entity id="infobox-Klassenraum"
                  visible="false"
                  position="0 0.6 -2"
                  rotation="0 0 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>

          <a-text value="Das ist der Klassenraum der Klasse 9A. Wir sind 26 Schueler/innen. Hier werden alle Faecher unterrichtet ausser die Praxisstunden in Nawi und Zukunft."
                  color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>

          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5"
                    material="color: #ff0000"
                    position="1.50 0.70 0.01"
                    class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Nawi (gleiches Muster wie Klassenraum) -->
      <a-entity id="panel-Nawi" visible="false" position="0 1.2 -2.0" rotation="0 0 0">
        <a-entity id="info-icon-Nawi"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Nawi"></a-entity>

        <a-entity id="infobox-Nawi"
                  visible="false"
                  position="0 0.6 -2"
                  rotation="0 0 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>

          <a-text value="Das ist der Nawiraum"
                  color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>

          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5"
                    material="color: #ff0000"
                    position="1.50 0.70 0.01"
                    class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Werkstatt -->
      <a-entity id="panel-Werkstatt" visible="false" position="0 1.2 -2.0" rotation="0 0 0">
        <a-entity id="info-icon-Werkstatt"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Werkstatt"></a-entity>

        <a-entity id="infobox-Werkstatt"
                  visible="false"
                  position="0 0.6 -2"
                  rotation="0 0 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>

          <a-text value="Hier in der Werkstatt lernst du praktisches Arbeiten mit Holz und Metall. Im Makerspace nebenan gibt es technische Angebote wie 3D Druck und Lasercut."
                  color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>

          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5"
                    material="color: #ff0000"
                    position="1.50 0.70 0.01"
                    class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Hof -->
      <a-entity id="panel-Hof" visible="false" position="2.5 1.5 4.0" rotation="0 -155 0">
        <a-plane width="0.94" height="1.78" color="#000" position="0 0 -0.002" opacity="0.7"></a-plane>
        <a-video id="hof-video-plane"
                 class="link"
                 src="#HofVideo"
                 width="0.888" height="1.664"
                 position="0 0 0"
                 video-controls="video: #HofVideo; hint: #hof-unmute-hint">
        </a-video>
        <a-text id="hof-unmute-hint"
                value="Bitte blinzeln, um den Ton zu aktivieren."
                align="center"
                width="1.6"
                position="0 -1.05 0"
                color="#fff"
                visible="false">
        </a-text>

        <a-entity id="info-icon-Hof"
                  position="1.1 -1.0 0.12"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Hof"></a-entity>

        <a-entity id="infobox-Hof" visible="false" position="1.6 0.0 0.2" rotation="0 -15 0">
          <a-plane width="2.8" height="1.6" color="#fff" opacity="0.95"></a-plane>
          <a-text value="Bauhuette, Begegnungen, Pausen, Projekte." color="#000" position="0 -0.1 0.02" width="2.6" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>
          <a-entity geometry="primitive: plane; width: 0.4; height: 0.4" material="color: #ff0000" position="1.1 0.55 0.01" class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Bibliothek -->
      <a-entity id="panel-Bibliothek" visible="false" position="1.8 2.5 -3" rotation="0 -20 0">
        <a-entity id="info-icon-Bibliothek"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Bibliothek"></a-entity>
        <a-entity id="infobox-Bibliothek" visible="false" position="3.5 0.6 -1" rotation="0 -30 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>
          <a-text value="In der Bibliothek steht das Lesen im Mittelpunkt. Besonders dienstags wird sie aktiv genutzt, um in ruhiger Atmosphaere in Buecher einzutauchen." color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>
          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5" material="color: #ff0000" position="1.50 0.70 0.01" class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Küche -->
      <a-entity id="panel-Kueche" visible="false" position="0 1.2 -2.0" rotation="0 0 0">
        <a-entity id="info-icon-Kueche"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Kueche"></a-entity>
        <a-entity id="infobox-Kueche" visible="false" position="0 0.6 -2" rotation="0 0 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>
          <a-text value="Essen, Begegnung, Gespraeche." color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>
          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5" material="color: #ff0000" position="1.50 0.70 0.01" class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Teilungsraum -->
      <a-entity id="panel-Teilungsraum" visible="false" position="3 3 -2" rotation="0 -30 0">
        <a-entity id="info-icon-Teilungsraum"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Teilungsraum"></a-entity>
        <a-entity id="infobox-Teilungsraum" visible="false" position="2.5 -0.45 2" rotation="0 -47 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>
          <a-text value="Der Teilungsraum dient als zusaetzlicher Unterrichtsraum. Hier haben Schueler regulaeren Unterricht, zum Beispiel in kleineren Gruppen oder bei besonderem Foerderbedarf." color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>
          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5" material="color: #ff0000" position="1.50 0.70 0.01" class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Kunstraum -->
      <a-entity id="panel-Kunstraum" visible="false" position="-3 1.9 2.0" rotation="-5 85 0">
        <a-entity id="info-icon-Kunstraum"
                  position="-0.0 -0.3 0.02"
                  geometry="primitive: plane; width: 0.6; height: 0.6"
                  material="src: img/Infobutton.png; transparent: true"
                  class="clickable"
                  info-trigger="box: #infobox-Kunstraum"></a-entity>
        <a-entity id="infobox-Kunstraum" visible="false" position="0 0.6 -2" rotation="0 0 0">
          <a-plane width="3.6" height="2.0" color="#fff" opacity="0.95"></a-plane>
          <a-text value="Im Kunstraum wird kreativ gearbeitet, gemalt und gestaltet. Gelegentlich finden hier auch inspirierende Unterrichtseinheiten statt." color="#000" position="0 -0.05 0.02" width="3.2" align="center"
                  material="depthTest: false; depthWrite: false"></a-text>
          <a-entity geometry="primitive: plane; width: 0.5; height: 0.5" material="color: #ff0000" position="1.50 0.70 0.01" class="close-button">
            <a-text value="X" align="center" color="#fff" width="2.2" scale="2 2 2" position="-0.175 0 0.01"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Kamera + Cursor -->
      <a-entity camera look-controls="magicWindow: true; touchEnabled: true" position="0 1.6 0">
        <a-cursor raycaster="objects: .link, .clickable; interval: 100; far: 50; recursive: true"
                  fuse="true" fuse-timeout="900"></a-cursor>
      </a-entity>

    </a-scene>

    <script>

      // Hilfsfunktion: Unsichtbaren, doppelseitigen Collider als Kind des Icons hinzufügen
      function ensureCollider(iconEl, width=0.8, height=0.8, z=0.03) {
        if (!iconEl) return null;
        let col = iconEl.querySelector('.hit-collider');
        if (col) return col;
        col = document.createElement('a-entity');
        col.classList.add('hit-collider', 'clickable', 'link');
        col.setAttribute('geometry', {primitive: 'plane', width, height});
        col.setAttribute('material', {opacity: 0, transparent: true, side: 'double', depthTest: false, depthWrite: false});
        col.setAttribute('position', {x: 0, y: 0, z});
        iconEl.appendChild(col);
        return col;
      }

      // Info-Trigger: Klassenraum-Logik, panel-lokal schließen und Box öffnen
      AFRAME.registerComponent('info-trigger', {
        schema: { box: { type: 'selector' } },
        init: function () {
          const el = this.el;
          const box = this.data.box;
          if (!box) return;

          const panel = el.closest('[id^="panel-"]');
          const open = (e) => {
            if (panel && panel.getAttribute('visible') !== true) return;
            e && e.stopPropagation && e.stopPropagation();
            if (panel) panel.querySelectorAll('[id^="infobox-"]').forEach(b => b.setAttribute('visible', false));
            box.setAttribute('visible', true);
          };

          // Icon selbst klickbar machen
          el.classList.add('clickable','link');
          el.addEventListener('click', open);

          // Collider hinzufügen
          const collider = ensureCollider(el);
          if (collider) collider.addEventListener('click', open);

          // Debug: Mausklick-Log
          const logClick = () => console.log('[ICON CLICK]', el.id);
          el.addEventListener('click', logClick);
          if (collider) collider.addEventListener('click', logClick);

          // Close-Button verdrahten
          const closeBtn = box.querySelector('.close-button');
          if (closeBtn && !closeBtn._wired) {
            closeBtn.classList.add('clickable','link');
            const close = (e) => { e && e.stopPropagation && e.stopPropagation(); box.setAttribute('visible', false); };
            closeBtn.addEventListener('click', close);
            closeBtn._wired = true;
          }

          // Texte leicht nach vorn, depth off
          box.querySelectorAll('a-text').forEach(t => {
            const p = t.getAttribute('position') || {x:0,y:0,z:0.01};
            const z = typeof p.z === 'number' ? Math.max(0.02, p.z) : 0.02;
            t.setAttribute('position', {x:p.x, y:p.y, z});
            t.setAttribute('material', 'depthTest: false; depthWrite: false');
          });
        }
      });

      // Video-Controls (wie bei dir)
      AFRAME.registerComponent('video-controls', {
        schema: { video: {type: 'selector'}, hint: {type: 'selector'} },
        init() {
          this.onActivate = this.onActivate.bind(this);
          this.activated = false;
          this.el.addEventListener('click', this.onActivate);
        },
        async onActivate() {
          const v = this.data.video;
          if (!v || this.activated) return;
          try {
            if (v.paused) { v.muted = true; await v.play().catch(()=>{}); }
            v.muted = false; await v.play().catch(()=>{});
          } catch(e) {}
          this.activated = true;
          if (this.data.hint) this.data.hint.setAttribute('visible', false);
          this.el.classList.remove('link');
        }
      });


      // Collider für Close-Buttons
      function ensureCloseCollider(btnEl, size=0.55, z=0.03) {
        if (!btnEl) return null;
        let col = btnEl.querySelector('.close-hit-collider');
        if (col) return col;
        col = document.createElement('a-entity');
        col.classList.add('close-hit-collider', 'clickable', 'link');
        col.setAttribute('geometry', {primitive: 'plane', width: size, height: size});
        col.setAttribute('material', {opacity: 0, transparent: true, side: 'double', depthTest: false, depthWrite: false});
        col.setAttribute('position', {x: 0, y: 0, z});
        btnEl.appendChild(col);
        return col;
      }

      function wireCloseButtons(panelEl) {
        if (!panelEl) return;
        const boxes = panelEl.querySelectorAll('[id^="infobox-"]');
        boxes.forEach(box => {
          const closeBtn = box.querySelector('.close-button');
          if (!closeBtn) return;

          // Als klickbar markieren
          closeBtn.classList.add('clickable', 'link');

          // Eigener Close-Handler (zusätzlich zur info-trigger-Logik, falls diese noch nicht aktiv ist)
          if (!closeBtn._extraCloseWired) {
            const close = (e) => {
              e && e.stopPropagation && e.stopPropagation();
              box.setAttribute('visible', false);
            };
            closeBtn.addEventListener('click', close);
            // Collider davor ergänzen und ebenfalls verkabeln
            const col = ensureCloseCollider(closeBtn);
            if (col && !col._extraCloseWired) {
              col.addEventListener('click', close);
              col._extraCloseWired = true;
            }
            closeBtn._extraCloseWired = true;
          }
        });
      }


      // Sichtbarkeits-Helfer: Nur sichtbare Panels liefern Klickziele
      function setPanelInteractive(panelEl, interactive) {
        if (!panelEl) return;

        // Info-Icons ein-/ausschalten
        const icons = panelEl.querySelectorAll('[id^="info-icon-"]');
        icons.forEach(icon => {
          if (interactive) {
            icon.classList.add('clickable','link');
            ensureCollider(icon); // Icon-Collider sicherstellen
          } else {
            icon.classList.remove('clickable','link');
            const col = icon.querySelector('.hit-collider');
            if (col) col.parentNode && col.parentNode.removeChild(col);
          }
        });

        // Close-Buttons zuverlässig klickbar machen, wenn Panel aktiv ist
        if (interactive) {
          wireCloseButtons(panelEl);
        } else {
          // Beim Deaktivieren Collider der Close-Buttons entfernen
          panelEl.querySelectorAll('.close-button').forEach(btn => {
            btn.classList.remove('clickable','link');
            const col = btn.querySelector('.close-hit-collider');
            if (col) col.parentNode && col.parentNode.removeChild(col);
          });
        }
      }


      // tour-link (wie bei dir), plus: Interaktivität nur im Ziel-Panel aktivieren
      AFRAME.registerComponent('tour-link', {
        schema: { targetId: { type: 'string' } },
        init() {
          this.onActivate = this.onActivate.bind(this);
          this.el.addEventListener('click', this.onActivate);
        },
        remove() { this.el.removeEventListener('click', this.onActivate); },
        onActivate() {
          const sceneEl = this.el.sceneEl;
          if (sceneEl.dataset.fading === '1') return;
          sceneEl.dataset.fading = '1';

          const skyCurrent  = sceneEl.querySelector('#sky-current');
          const skyNext     = sceneEl.querySelector('#sky-next');
          const bar         = document.querySelector('.loading-bar');
          const progress    = document.querySelector('#progress');
          const targetId    = this.data.targetId;

          // Videos: nur Zielszene aktiv
          const mensaVideo  = document.getElementById('MensaVideo');
          const hofVideo    = document.getElementById('HofVideo');
          const mensaPlane  = document.getElementById('mensa-video-plane');
          const hofPlane    = document.getElementById('hof-video-plane');

          const pauseReset = (videoEl, planeEl) => {
            if (videoEl) { try { videoEl.pause(); } catch(e){} videoEl.currentTime = 0; videoEl.muted = true; }
            if (planeEl) { planeEl.classList.add('link'); const vc = planeEl.components && planeEl.components['video-controls']; if (vc) vc.activated = false; }
          };
          const armMuted = (videoEl) => { if (videoEl) { videoEl.muted = true; videoEl.play().catch(()=>{}); } };

          if (targetId === 'Mensa') { armMuted(mensaVideo); pauseReset(hofVideo, hofPlane); }
          else if (targetId === 'Hof') { armMuted(hofVideo); pauseReset(mensaVideo, mensaPlane); }
          else { pauseReset(mensaVideo, mensaPlane); pauseReset(hofVideo, hofPlane); }

          // Video-Interaktivität strikt an Szene koppeln
          setVideoPlaneInteractive(mensaPlane, targetId === 'Mensa');
          setVideoPlaneInteractive(hofPlane,   targetId === 'Hof');


          // Aktiviert/Deaktiviert die Interaktivität (Klick/Gaze) eines Video-Planes
          function setVideoPlaneInteractive(planeEl, interactive) {
            if (!planeEl) return;
            if (interactive) {
              planeEl.classList.add('link');    // vom Raycaster erfasst
              planeEl.classList.add('clickable');
            } else {
              planeEl.classList.remove('link'); // NICHT mehr vom Raycaster erfasst
              planeEl.classList.remove('clickable');
            }
          }


          // Alle Panels unsichtbar und nicht interaktiv
          const allPanels = Array.from(sceneEl.querySelectorAll('[id^="panel-"]'));
          allPanels.forEach(p => { p.setAttribute('visible', false); setPanelInteractive(p, false); });
          // Alle Infoboxen schließen
          Array.from(sceneEl.querySelectorAll('[id^="infobox-"]')).forEach(b => b.setAttribute('visible', false));

          // Loader
          if (bar && progress) { bar.style.opacity = 1; progress.style.width = '0%'; }

          // Zielbild laden
          const targetAsset = document.getElementById(targetId);
          const srcToUse = targetAsset ? ('#' + targetId) : '#placeholder';

          skyNext.setAttribute('visible', true);
          skyNext.setAttribute('opacity', 0);
          skyNext.setAttribute('material', 'src', srcToUse);

          let safetyTimer = setTimeout(() => { skyNext.setAttribute('material', 'src', '#placeholder'); }, 4000);

          const onTexLoaded = () => {
            clearTimeout(safetyTimer);
            skyNext.removeEventListener('materialtextureloaded', onTexLoaded);

            if (progress) progress.style.width = '100%';
            skyNext.setAttribute('animation__fadein',  'property: opacity; from: 0; to: 1; dur: 600; easing: easeOutQuad');
            skyCurrent.setAttribute('animation__fadeout','property: opacity; from: 1; to: 0; dur: 600; easing: easeOutQuad');

            const onFadeDone = () => {
              skyNext.removeEventListener('animationcomplete__fadein', onFadeDone);

              const nextSrc = skyNext.getAttribute('material').src;
              skyCurrent.setAttribute('material', 'src', nextSrc);
              skyCurrent.setAttribute('opacity', 1);
              skyCurrent.removeAttribute('animation__fadeout');

              skyNext.setAttribute('visible', false);
              skyNext.setAttribute('opacity', 0);
              skyNext.removeAttribute('animation__fadein');

              if (bar && progress) { bar.style.opacity = 0; progress.style.width = '0%'; }

              // Panels für Zielszene + Hints korrekt setzen
              const mensaPanelVideo = document.getElementById('panel-MensaVideo');
              const mensaHint = document.getElementById('unmute-hint');       // NEW
              const hofHint = document.getElementById('hof-unmute-hint');     // NEW

              if (mensaPanelVideo) mensaPanelVideo.setAttribute('visible', targetId === 'Mensa');

              // Hints: In aktiver Videoszene sichtbar, sonst ausblenden (werden bei erstem Klick vom video-controls verborgen)
              if (mensaHint) mensaHint.setAttribute('visible', targetId === 'Mensa');  // NEW
              if (hofHint)   hofHint.setAttribute('visible',   targetId === 'Hof');    // NEW

              const targetPanel = document.getElementById('panel-' + targetId);
              if (targetPanel) {
                targetPanel.setAttribute('visible', true);
                setPanelInteractive(targetPanel, true);
              }


              sceneEl.dataset.currentId = targetId;
              delete sceneEl.dataset.fading;
            };
            skyNext.addEventListener('animationcomplete__fadein', onFadeDone);
          };

          skyNext.addEventListener('materialtextureloaded', onTexLoaded);
        }
      });

      // Initial: Startpanel sichtbar und nur dort Klickziele aktivieren
      document.addEventListener('DOMContentLoaded', () => {
        const sceneEl    = document.querySelector('a-scene');
        const skyCurrent = document.getElementById('sky-current');

        sceneEl.addEventListener('loaded', () => {
          const allPanels = Array.from(sceneEl.querySelectorAll('[id^="panel-"]'));
          allPanels.forEach(p => { p.setAttribute('visible', false); setPanelInteractive(p, false); });

          const startSrc = (skyCurrent && skyCurrent.getAttribute('src')) || '';
          let startId = 'Werkstatt';
          if (String(startSrc).includes('#Mensa')) startId = 'Mensa';
          else if (String(startSrc).includes('#Nawi')) startId = 'Nawi';
          else if (String(startSrc).includes('#Hof')) startId = 'Hof';
          else if (String(startSrc).includes('#Bibliothek')) startId = 'Bibliothek';
          else if (String(startSrc).includes('#Kueche')) startId = 'Kueche';
          else if (String(startSrc).includes('#Teilungsraum')) startId = 'Teilungsraum';
          else if (String(startSrc).includes('#Kunstraum')) startId = 'Kunstraum';
          else if (String(startSrc).includes('#Klassenraum')) startId = 'Klassenraum';

          document.getElementById('panel-MensaVideo')?.setAttribute('visible', startId === 'Mensa');
          // Hints beim Start korrekt setzen
          const mensaHint0 = document.getElementById('unmute-hint');      // NEW
          const hofHint0   = document.getElementById('hof-unmute-hint');  // NEW
          if (mensaHint0) mensaHint0.setAttribute('visible', startId === 'Mensa');  // NEW
          if (hofHint0)   hofHint0.setAttribute('visible',   startId === 'Hof');    // NEW

          // Video-Interaktivität zum Start korrekt setzen
          const mensaPlane0 = document.getElementById('mensa-video-plane');
          const hofPlane0   = document.getElementById('hof-video-plane');
          setVideoPlaneInteractive(mensaPlane0, startId === 'Mensa');
          setVideoPlaneInteractive(hofPlane0,   startId === 'Hof');


          const targetPanel = document.getElementById('panel-' + startId);
          if (targetPanel) {
            // Panel sichtbar machen
            targetPanel.setAttribute('visible', true);

            // Icons im Startpanel explizit sichtbar und mit Collider versehen
            const startIcons = targetPanel.querySelectorAll('[id^="info-icon-"]');
            startIcons.forEach(icon => {
              icon.setAttribute('visible', true);      // falls visibility-Chain irgendwo blockiert
              icon.classList.add('clickable','link');  // sicher vom Raycaster erfasst
              ensureCollider(icon);                    // Collider sicherstellen
            });

            // Interaktivität im nächsten Frame erneut aktivieren (damit Scenegraph + Cursor ready sind)
            requestAnimationFrame(() => {
              setPanelInteractive(targetPanel, true);
            }, 0);
          }



          // Cursor recursive sicher aktiv
          const cur = document.querySelector('a-cursor');
          if (cur) {
            const rc = cur.getAttribute('raycaster') || {};
            cur.setAttribute('raycaster', Object.assign({}, rc, {objects: '.link, .clickable', far: 50, interval: 100, recursive: true}));
          }
        });
      });
      </script>





  </body>
